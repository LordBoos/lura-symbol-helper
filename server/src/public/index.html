<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lura Symbol Helper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      background: #0f1628;
      width: 100%;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 16px; color: #4FC3F7; font-weight: 600; }
    .header .star { font-size: 20px; }

    .lang-switch { display: flex; gap: 4px; }
    .lang-switch button {
      padding: 4px 10px; font-size: 11px; border-radius: 4px;
      background: #0f3460; color: #888; border: none;
      font-weight: 600; cursor: pointer;
    }
    .lang-switch button:hover { background: #1a4a7a; color: #ccc; }
    .lang-switch button.active { background: #4FC3F7; color: #1a1a2e; }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section {
      background: #16213e;
      border-radius: 10px;
      padding: 16px;
      border: 1px solid #0f3460;
    }
    .section h2 {
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 1px; color: #888; margin-bottom: 12px;
    }

    .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #E57373; transition: background 0.3s; }
    .status-dot.connected { background: #81C784; }
    .status-dot.connecting { background: #FFB74D; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    input[type="text"] {
      width: 100%; background: #0a0a1a; border: 1px solid #0f3460;
      border-radius: 8px; padding: 12px; color: #e0e0e0;
      font-size: 16px; outline: none; margin-bottom: 10px;
    }
    input[type="text"]:focus { border-color: #4FC3F7; }
    input[type="text"]::placeholder { color: #555; }
    .session-input {
      text-transform: uppercase; letter-spacing: 3px;
      text-align: center; font-weight: bold; font-size: 20px;
    }

    button {
      width: 100%; background: #4FC3F7; color: #1a1a2e;
      border: none; border-radius: 8px; padding: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #81D4FA; }
    button:disabled { opacity: 0.5; }
    button.danger { background: #E57373; color: #fff; margin-top: 10px; }

    .session-info {
      display: flex; align-items: center; justify-content: space-between;
      background: #0a0a1a; border-radius: 8px; padding: 14px; margin-bottom: 10px;
    }
    .session-id {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 28px; font-weight: bold; color: #4FC3F7; letter-spacing: 4px;
    }
    .player-count { display: flex; align-items: center; gap: 6px; color: #aaa; font-size: 14px; }
    .player-count .count { color: #81C784; font-weight: bold; font-size: 18px; }

    .boss-display {
      position: relative; width: 100%; max-width: 340px;
      height: 200px; margin: 10px auto;
    }
    .boss-center {
      position: absolute; top: 65px; left: 50%;
      transform: translate(-50%, -50%);
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(22, 33, 62, 0.8);
      border: 2px solid rgba(79, 195, 247, 0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px;
    }
    .pos-slot {
      position: absolute; width: 54px; height: 54px; border-radius: 50%;
      background: rgba(22, 33, 62, 0.5);
      border: 2px dashed rgba(255, 255, 255, 0.1);
      display: flex; align-items: center; justify-content: center;
      transform: translate(-50%, -50%); transition: all 0.25s;
    }
    .pos-slot.filled { border-style: solid; border-width: 3px; background: rgba(22, 33, 62, 0.9); }
    .pos-slot .slot-icon { line-height: 0; }
    .pos-slot .slot-icon img { width: 54px; height: 54px; border-radius: 50%; }
    .pos-slot .slot-num {
      position: absolute; top: -6px; right: -6px;
      width: 22px; height: 22px; border-radius: 50%;
      color: #1a1a2e; font-size: 12px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0); transition: all 0.2s;
    }
    .pos-slot .slot-num.visible { opacity: 1; transform: scale(1); }
    .pos-slot .slot-label {
      position: absolute; bottom: -14px; left: 50%;
      transform: translateX(-50%); font-size: 9px; color: #555; white-space: nowrap;
    }
    .pos-slot[data-slot="0"] { left: 79%; top: 65px; }
    .pos-slot[data-slot="1"] { left: 71%; top: 136px; }
    .pos-slot[data-slot="2"] { left: 50%; top: 165px; }
    .pos-slot[data-slot="3"] { left: 29%; top: 136px; }
    .pos-slot[data-slot="4"] { left: 21%; top: 65px; }

    .waiting { text-align: center; padding: 20px; color: #555; font-size: 14px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="star">&#9733;</span>
      <h1>Lura Symbol Helper</h1>
    </div>
    <div class="lang-switch">
      <button id="langCs" class="active">CZ</button>
      <button id="langEn">EN</button>
    </div>
  </div>

  <div class="container">
    <div class="section">
      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText" style="font-size:13px;color:#aaa;">Připojování...</span>
      </div>
    </div>

    <div class="section" id="joinSection">
      <h2 data-i18n="joinSession">Připojit se k relaci</h2>
      <input type="text" id="playerName" data-i18n-placeholder="playerName" placeholder="Vaše jméno" />
      <input type="text" id="sessionId" class="session-input" data-i18n-placeholder="sessionIdPlaceholder2" placeholder="ID relace" maxlength="6" />
      <button id="joinBtn" data-i18n="join">Připojit se</button>
    </div>

    <div class="section hidden" id="sessionSection">
      <div class="session-info">
        <div>
          <div style="font-size:11px;color:#888;margin-bottom:2px;" data-i18n="sessionId">ID RELACE</div>
          <div class="session-id" id="displaySessionId">------</div>
        </div>
        <div class="player-count">
          <span>&#128101;</span>
          <span class="count" id="playerCount">0</span>
          <span data-i18n="players">hráčů</span>
        </div>
      </div>

      <div class="boss-display">
        <div class="pos-slot" data-slot="0"><span class="slot-icon"></span><span class="slot-num"></span><span class="slot-label">1.</span></div>
        <div class="pos-slot" data-slot="1"><span class="slot-icon"></span><span class="slot-num"></span><span class="slot-label">2.</span></div>
        <div class="pos-slot" data-slot="2"><span class="slot-icon"></span><span class="slot-num"></span><span class="slot-label">3.</span></div>
        <div class="pos-slot" data-slot="3"><span class="slot-icon"></span><span class="slot-num"></span><span class="slot-label">4.</span></div>
        <div class="pos-slot" data-slot="4"><span class="slot-icon"></span><span class="slot-num"></span><span class="slot-label">5.</span></div>
        <div class="boss-center">BOSS</div>
      </div>

      <div class="waiting" id="waitingMsg" data-i18n="waiting">Čekám na sekvenci od raid leadera...</div>

      <button class="danger" id="leaveBtn" data-i18n="leaveSession">Opustit relaci</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // i18n for web
    const LANG_KEY = 'lura_language';
    const translations = {
      cs: {
        connecting: 'P\u0159ipojov\u00e1n\u00ed...', connected: 'P\u0159ipojeno', disconnected: 'Odpojeno',
        joinSession: 'P\u0159ipojit se k relaci', playerName: 'Va\u0161e jm\u00e9no',
        sessionIdPlaceholder2: 'ID relace', join: 'P\u0159ipojit se',
        sessionId: 'ID RELACE', players: 'hr\u00e1\u010d\u016f',
        waiting: '\u010cek\u00e1m na sekvenci od raid leadera...',
        leaveSession: 'Opustit relaci', language: 'Jazyk',
      },
      en: {
        connecting: 'Connecting...', connected: 'Connected', disconnected: 'Disconnected',
        joinSession: 'Join a session', playerName: 'Your name',
        sessionIdPlaceholder2: 'Session ID', join: 'Join',
        sessionId: 'SESSION ID', players: 'players',
        waiting: 'Waiting for sequence from raid leader...',
        leaveSession: 'Leave session', language: 'Language',
      },
    };

    function getLang() { return localStorage.getItem(LANG_KEY) || 'cs'; }
    function setLang(l) { localStorage.setItem(LANG_KEY, l); }
    function t(key) { return (translations[getLang()] || {})[key] || translations.cs[key] || key; }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
      document.getElementById('langCs').classList.toggle('active', getLang() === 'cs');
      document.getElementById('langEn').classList.toggle('active', getLang() === 'en');
    }

    document.getElementById('langCs').addEventListener('click', () => { setLang('cs'); applyTranslations(); updateStatusText(); });
    document.getElementById('langEn').addEventListener('click', () => { setLang('en'); applyTranslations(); updateStatusText(); });

    function updateStatusText() {
      if (socket && socket.connected) {
        $('statusDot').className = 'status-dot connected';
        $('statusText').textContent = t('connected');
      } else {
        $('statusDot').className = 'status-dot';
        $('statusText').textContent = t('disconnected');
      }
    }

    // Symbols
    const SYMBOLS = [
      { id: 0, name: 'Circle',   img: '/symbols/circle.png',   color: '#4FC3F7' },
      { id: 1, name: 'Triangle', img: '/symbols/triangle.png', color: '#9C6FE4' },
      { id: 2, name: 'Diamond',  img: '/symbols/diamond.png',  color: '#5C7AEA' },
      { id: 3, name: 'T',        img: '/symbols/T.png',        color: '#4FC3F7' },
      { id: 4, name: 'X',        img: '/symbols/x.png',        color: '#4FC3F7' },
    ];

    const $ = (id) => document.getElementById(id);
    let socket = null;
    let session = { sessionId: null, playerCount: 0, sequence: [] };

    function connect() {
      socket = io({ transports: ['websocket', 'polling'], reconnection: true, reconnectionAttempts: Infinity });

      socket.on('connect', () => {
        updateStatusText();
        const saved = sessionStorage.getItem('lura_session');
        const name = sessionStorage.getItem('lura_name');
        if (saved && name) {
          socket.emit('join-session', { sessionId: saved, playerName: name, isLeader: false });
        }
      });

      socket.on('disconnect', () => {
        updateStatusText();
      });

      socket.on('session-joined', (data) => {
        session = { sessionId: data.sessionId, playerCount: data.playerCount, sequence: data.sequence };
        sessionStorage.setItem('lura_session', data.sessionId);
        requestWakeLock();
        updateUI();
      });

      socket.on('session-error', ({ message }) => { alert(message); });

      socket.on('sequence-updated', ({ sequence }) => { session.sequence = sequence; updateUI(); });
      socket.on('sequence-cleared', () => { session.sequence = []; updateUI(); });
      socket.on('players-updated', ({ count }) => { session.playerCount = count; updateUI(); });
    }

    $('joinBtn').addEventListener('click', () => {
      const name = $('playerName').value.trim() || 'Player';
      const id = $('sessionId').value.trim().toUpperCase();
      if (!id) return;
      sessionStorage.setItem('lura_name', name);
      socket.emit('join-session', { sessionId: id, playerName: name, isLeader: false });
    });

    $('sessionId').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('joinBtn').click(); });

    $('leaveBtn').addEventListener('click', () => {
      socket.emit('leave-session');
      session = { sessionId: null, playerCount: 0, sequence: [] };
      sessionStorage.removeItem('lura_session');
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      updateUI();
    });

    function updateUI() {
      const hasSession = !!session.sessionId;
      $('joinSection').classList.toggle('hidden', hasSession);
      $('sessionSection').classList.toggle('hidden', !hasSession);

      if (!hasSession) return;

      $('displaySessionId').textContent = session.sessionId;
      $('playerCount').textContent = String(session.playerCount);

      const seq = session.sequence;
      $('waitingMsg').classList.toggle('hidden', seq.length > 0);

      for (let slot = 0; slot < 5; slot++) {
        const slotEl = document.querySelector('[data-slot="' + slot + '"]');
        const iconEl = slotEl.querySelector('.slot-icon');
        const numEl = slotEl.querySelector('.slot-num');
        const labelEl = slotEl.querySelector('.slot-label');

        if (slot < seq.length) {
          const sym = SYMBOLS[seq[slot]];
          if (!sym) continue;
          slotEl.classList.add('filled');
          slotEl.style.borderColor = sym.color;
          iconEl.innerHTML = '<img src="' + sym.img + '" alt="' + sym.name + '" style="width:54px;height:54px;border-radius:50%;" />';
          numEl.textContent = String(slot + 1);
          numEl.style.background = sym.color;
          numEl.classList.add('visible');
          labelEl.textContent = sym.name;
          labelEl.style.color = sym.color;
        } else {
          slotEl.classList.remove('filled');
          slotEl.style.borderColor = '';
          iconEl.innerHTML = '';
          numEl.textContent = '';
          numEl.classList.remove('visible');
          numEl.style.background = '';
          labelEl.textContent = (slot + 1) + '.';
          labelEl.style.color = '';
        }
      }
    }

    // Wake Lock
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', () => { wakeLock = null; });
        }
      } catch (e) {}
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && session.sessionId) requestWakeLock();
    });

    applyTranslations();
    connect();
  </script>
</body>
</html>
