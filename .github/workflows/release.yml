name: Release

on:
  workflow_run:
    workflows: ["Build Client Apps"]
    types: [completed]
    branches: [main, master]

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./client/package.json').version")
          SHA_SHORT=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Lura-Symbol-Helper-Windows
          path: ./artifacts/windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: Lura-Symbol-Helper-macOS-arm64
          path: ./artifacts/mac-arm64
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: Lura-Symbol-Helper-macOS-x64
          path: ./artifacts/mac-x64
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: List artifacts
        run: find ./artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Lura Symbol Helper ${{ steps.version.outputs.version }} (${{ steps.version.outputs.date }})
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows | `Lura Symbol Helper.exe` |
            | macOS (Apple Silicon) | `Lura Symbol Helper-arm64.dmg` |
            | macOS (Intel) | `Lura Symbol Helper-x64.dmg` |

            ### Notes
            - Windows: SmartScreen may warn on first launch — click "More info" → "Run anyway"
            - macOS: Right-click → Open on first launch to bypass Gatekeeper
            - Default server: `http://localhost:3000` (change in app settings)
          files: |
            ./artifacts/windows/*
            ./artifacts/mac-arm64/*
            ./artifacts/mac-x64/*
          draft: false
          prerelease: false
