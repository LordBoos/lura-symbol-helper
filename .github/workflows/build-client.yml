name: Build Client Apps

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - '.github/workflows/build-client.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Windows portable
        working-directory: ./client
        run: npm run build:win
        env:
          LURA_SERVER_URL: https://lura.boos.software

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lura-Symbol-Helper-Windows
          path: client/release/*.exe
          retention-days: 90

  build-mac-arm64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build macOS DMG (arm64)
        working-directory: ./client
        run: node scripts/set-server-url.js && npx electron-builder --mac dmg --arm64
        env:
          LURA_SERVER_URL: https://lura.boos.software

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lura-Symbol-Helper-macOS-arm64
          path: client/release/*.dmg
          retention-days: 90

  build-mac-x64:
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build macOS DMG (x64)
        working-directory: ./client
        run: node scripts/set-server-url.js && npx electron-builder --mac dmg --x64
        env:
          LURA_SERVER_URL: https://lura.boos.software

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lura-Symbol-Helper-macOS-x64
          path: client/release/*.dmg
          retention-days: 90
