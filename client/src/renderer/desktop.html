<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lura Symbol Helper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f1628;
      padding: 0 8px;
      height: 32px;
      -webkit-app-region: drag;
      user-select: none;
    }
    .titlebar .title {
      font-size: 12px; color: #4FC3F7;
      display: flex; align-items: center; gap: 6px;
    }
    .titlebar-btns {
      display: flex;
      -webkit-app-region: no-drag;
    }
    .titlebar-btns button {
      background: none; border: none; color: #888;
      font-size: 16px; width: 36px; height: 32px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .titlebar-btns button:hover { background: #2a2a4e; color: #fff; }
    .titlebar-btns button.close-btn:hover { background: #e74c3c; color: #fff; }

    .content {
      flex: 1; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto;
    }

    .section {
      background: #16213e; border-radius: 8px;
      padding: 16px; border: 1px solid #0f3460;
    }
    .section h2 {
      font-size: 13px; text-transform: uppercase;
      letter-spacing: 1px; color: #888; margin-bottom: 12px;
    }

    .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #E57373; transition: background 0.3s; }
    .status-dot.connected { background: #81C784; }
    .status-dot.connecting { background: #FFB74D; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .input-group { display: flex; gap: 8px; margin-bottom: 10px; }

    input[type="text"] {
      flex: 1; background: #0a0a1a; border: 1px solid #0f3460;
      border-radius: 6px; padding: 10px 12px; color: #e0e0e0;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #4FC3F7; }
    input[type="text"]::placeholder { color: #555; }

    button {
      background: #4FC3F7; color: #1a1a2e; border: none;
      border-radius: 6px; padding: 10px 16px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      transition: background 0.2s, opacity 0.2s; white-space: nowrap;
    }
    button:hover { background: #81D4FA; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #0f3460; color: #e0e0e0; }
    button.secondary:hover { background: #1a4a7a; }
    button.danger { background: #E57373; color: #fff; }
    button.danger:hover { background: #EF9A9A; }

    .session-info {
      display: flex; align-items: center; justify-content: space-between;
      background: #0a0a1a; border-radius: 6px; padding: 12px; margin-bottom: 10px;
    }
    .session-id {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 24px; font-weight: bold; color: #4FC3F7; letter-spacing: 3px;
    }
    .player-count { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #aaa; }
    .player-count .count { color: #81C784; font-weight: bold; font-size: 16px; }

    .btn-row { display: flex; gap: 8px; }
    .hint { font-size: 12px; color: #666; margin-top: 8px; }

    .player-list-section { margin-top: 14px; border-top: 1px solid #0f3460; padding-top: 12px; }
    .player-list-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }
    .player-list { list-style: none; max-height: 200px; overflow-y: auto; }
    .player-list li { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; font-size: 13px; color: #ccc; }
    .player-list li:nth-child(odd) { background: rgba(15, 52, 96, 0.3); }
    .player-list .leader-icon { color: #FFB74D; font-size: 14px; }
    .player-list .player-name { flex: 1; }
    .player-list .leader-tag { font-size: 10px; color: #FFB74D; background: rgba(255, 183, 77, 0.15); padding: 1px 6px; border-radius: 4px; }

    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #4FC3F7; cursor: pointer; }
    .checkbox-row label { font-size: 14px; color: #ccc; cursor: pointer; }

    .lang-switch {
      display: flex; gap: 4px;
    }
    .lang-switch button {
      padding: 4px 10px; font-size: 12px; border-radius: 4px;
      background: #0f3460; color: #888; font-weight: 600;
    }
    .lang-switch button:hover { background: #1a4a7a; color: #ccc; }
    .lang-switch button.active { background: #4FC3F7; color: #1a1a2e; }

    .gh-link {
      display: inline-flex; align-items: center; gap: 4px;
      color: #888; font-size: 12px; text-decoration: none;
      padding: 4px 8px; border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .gh-link:hover { color: #ccc; background: rgba(255,255,255,0.05); }
    .gh-link svg { width: 16px; height: 16px; fill: currentColor; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="title">
      <span>&#9733;</span>
      <span data-i18n="appName">Lura Symbol Helper</span>
    </div>
    <div class="titlebar-btns">
      <button id="minimizeBtn">&#8211;</button>
      <button id="closeBtn" class="close-btn">&#10005;</button>
    </div>
  </div>

  <div class="content">
    <!-- Language + Server -->
    <div class="section" style="display:flex;align-items:center;justify-content:space-between;">
      <h2 style="margin:0" data-i18n="language">Jazyk</h2>
      <div style="display:flex;align-items:center;gap:8px;">
        <a class="gh-link" id="ghLink" title="GitHub">
          <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>
        <div class="lang-switch">
          <button id="langCs" class="active">CZ</button>
          <button id="langEn">EN</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 data-i18n="server">Server</h2>
      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Odpojeno</span>
      </div>
      <div class="input-group">
        <input type="text" id="serverUrl" placeholder="http://localhost:3000" />
        <button id="connectBtn">Připojit</button>
      </div>
    </div>

    <div class="section hidden" id="sessionSection">
      <h2 data-i18n="session">Relace</h2>

      <div id="noSession">
        <div class="input-group">
          <input type="text" id="playerName" data-i18n-placeholder="playerName" placeholder="Jméno hráče" />
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="isLeaderCheck" />
          <label for="isLeaderCheck" data-i18n="iAmLeader">Jsem raid leader</label>
        </div>
        <div class="btn-row" style="margin-bottom: 10px;">
          <button id="createBtn" data-i18n="createSession">Vytvořit relaci</button>
        </div>
        <div class="input-group">
          <input type="text" id="joinSessionId" data-i18n-placeholder="sessionIdPlaceholder"
                 placeholder="ID relace (např. A3X9K2)" maxlength="6"
                 style="text-transform: uppercase; letter-spacing: 2px;" />
          <button id="joinBtn" class="secondary" data-i18n="join">Připojit se</button>
        </div>
      </div>

      <div id="activeSession" class="hidden">
        <div class="session-info">
          <div>
            <div style="font-size: 12px; color: #888; margin-bottom: 4px;" data-i18n="sessionId">ID RELACE</div>
            <div class="session-id" id="displaySessionId">------</div>
          </div>
          <div class="player-count">
            <span>&#128101;</span>
            <span class="count" id="playerCount">0</span>
            <span data-i18n="players">hráčů</span>
          </div>
        </div>
        <div class="btn-row">
          <button id="copyBtn" class="secondary">&#128203; Kopírovat ID</button>
          <button id="leaveBtn" class="danger">Opustit relaci</button>
        </div>
        <div class="hint" id="leaderHint"></div>

        <div class="player-list-section">
          <h3 data-i18n="connectedPlayers">Připojení hráči</h3>
          <ul class="player-list" id="playerList"></ul>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 data-i18n="hotkey">Klávesová zkratka</h2>
      <p style="font-size: 12px; color: #888; margin-bottom: 8px;" data-i18n="hotkeyDesc">Zkratka pro zobrazení/skrytí overlay</p>
      <div class="input-group">
        <input type="text" id="hotkeyInput" data-i18n-placeholder="hotkeyPlaceholder"
               placeholder="Klikněte a stiskněte zkratku..." readonly
               style="cursor: pointer; text-align: center; font-weight: bold;" />
        <button id="hotkeyBtn" class="secondary" data-i18n="hotkeySet">Nastavit</button>
      </div>
      <div id="hotkeyError" style="font-size: 12px; color: #E57373; margin-top: 6px;" class="hidden"></div>
      <div id="hotkeyOk" style="font-size: 12px; color: #81C784; margin-top: 6px;" class="hidden"></div>
    </div>

    <div class="section">
      <h2 data-i18n="howToUse">Jak používat</h2>
      <p id="howToUseText" style="font-size: 13px; line-height: 1.6; color: #aaa;"></p>
    </div>
  </div>

  <script src="desktop.js"></script>
</body>
</html>
